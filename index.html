<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>測測看你是哪種遊學生？｜VIP遊學</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="start" class="card hero active">
      <div class="badge">VIP遊學人格測驗</div>
      <h1>測測看你是哪種遊學生？</h1>
      <p class="subtitle">第一次出國，你會先社死、迷路，還是直接交到朋友？</p>
      <div class="characters">
        <img src="assets/libai.png" alt="李白型遊學生">
        <img src="assets/dufu.png" alt="杜甫型遊學生">
        <img src="assets/sushi.png" alt="蘇東坡型遊學生">
        <img src="assets/mulan.jpg" alt="花木蘭型遊學生">
      </div>
      <button class="primary" onclick="startQuiz()">開始測驗</button>
      <p class="hint">7 題完成，結果頁可截圖分享。</p>
    </section>

    <section id="quiz" class="card quiz">
      <div class="topbar">
        <span id="progressText">1 / 7</span>
        <button class="ghost" onclick="restart()">重來</button>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
      <h2 id="questionTitle"></h2>
      <div id="options" class="options"></div>
    </section>

    <section id="result" class="card result">
      <div class="badge">你的結果</div>
      <img id="resultImage" class="result-img" alt="">
      <h1 id="resultName"></h1>
      <h2 id="resultType"></h2>
      <p id="resultDesc" class="desc"></p>

      <div class="block">
        <h3>✈️ 適合國家</h3>
        <div id="countries"></div>
      </div>

      <div class="quote" id="quote"></div>

      <div class="actions">
        <button class="primary" onclick="copyResult()">複製結果</button>
        <button class="secondary" onclick="restart()">再測一次</button>
      </div>
      <p class="hint">想知道自己適合哪一國遊學？私訊 VIP「遊學人格」。</p>
    </section>
  </main>

<script>
const questions = [
  {
    q: "1｜第一次出國你最怕？",
    opts: [
      {text:"不敢講英文", type:"libai"},
      {text:"交不到朋友", type:"dufu"},
      {text:"吃不習慣", type:"sushi"},
      {text:"一個人不敢冒險", type:"mulan"}
    ]
  },
  {
    q: "2｜到了國外 Welcome Party，你會？",
    opts: [
      {text:"主動想聊天但超尷尬", type:"libai"},
      {text:"先站旁邊觀察", type:"dufu"},
      {text:"先研究食物區", type:"sushi"},
      {text:"硬著頭皮加入陌生人", type:"mulan"}
    ]
  },
  {
    q: "3｜第一次迷路時，你會？",
    opts: [
      {text:"假裝很冷靜", type:"libai"},
      {text:"默默開 Google Maps", type:"dufu"},
      {text:"先去便利商店買東西", type:"sushi"},
      {text:"鼓起勇氣直接問路", type:"mulan"}
    ]
  },
  {
    q: "4｜第一次英文聽不懂，你會？",
    opts: [
      {text:"先笑著點頭", type:"libai"},
      {text:"當場當機", type:"dufu"},
      {text:"邊吃邊假裝有聽懂", type:"sushi"},
      {text:"勇敢說 “Can you say again?”", type:"mulan"}
    ]
  },
  {
    q: "5｜第一次 Homestay 晚餐，你會？",
    opts: [
      {text:"很想聊天但不知道怎麼開口", type:"libai"},
      {text:"安靜觀察大家互動", type:"dufu"},
      {text:"默默吃超多", type:"sushi"},
      {text:"主動幫忙收盤子", type:"mulan"}
    ]
  },
  {
    q: "6｜如果外國同學主動跟你聊天？",
    opts: [
      {text:"表面自然其實超緊張", type:"libai"},
      {text:"禮貌微笑慢慢聊", type:"dufu"},
      {text:"一聊到食物就開啟話題", type:"sushi"},
      {text:"即使害怕還是會接話", type:"mulan"}
    ]
  },
  {
    q: "7｜你最想在遊學得到什麼？",
    opts: [
      {text:"交到國外朋友", type:"libai"},
      {text:"變得更成熟", type:"dufu"},
      {text:"吃遍世界美食", type:"sushi"},
      {text:"變得更勇敢", type:"mulan"}
    ]
  }
];

const results = {
  libai: {
    name:"李白型遊學生",
    type:"浪漫社交型",
    img:"assets/libai.png",
    desc:"你其實很想認識世界，只是第一次到陌生環境時，容易突然社交失靈。你不是不敢交朋友，只是太在意自己看起來尷尬。但一旦熟了之後，你通常會變成團體裡最有記憶點的人。",
    countries:[
      ["🇬🇧 英國","社交節奏自然、有文化感，很適合慢慢打開自己。"],
      ["🇨🇦 加拿大","人友善、包容感高，第一次出國比較容易建立自信。"]
    ],
    quote:"你缺的不是能力，是第一個開口的瞬間。"
  },
  dufu: {
    name:"杜甫型遊學生",
    type:"慢熟觀察型",
    img:"assets/dufu.png",
    desc:"你不是不想融入，只是需要一點時間適應陌生環境。你很會觀察別人的情緒，也很容易記住旅途中的小細節。很多人第一次見你覺得安靜，熟了之後才發現你超真誠。",
    countries:[
      ["🇳🇿 紐西蘭","步調慢、自然感強，很適合第一次離家的人。"],
      ["🇦🇺 澳洲","氣氛比較 chill，不會有太大社交壓力。"]
    ],
    quote:"慢一點也沒關係，世界會等你開口。"
  },
  sushi: {
    name:"蘇東坡型遊學生",
    type:"美食探索型",
    img:"assets/sushi.png",
    desc:"你適應世界的方法：先吃一口。你對陌生文化的接受度超高，常常因為一間餐廳、一個超市、一頓晚餐愛上一座城市。別人記得景點，你記得最好吃的東西。",
    countries:[
      ["🇺🇸 美國","美食、城市、文化刺激很多，每天都像冒險。"],
      ["🇯🇵 日本","超商、美食、生活細節宇宙，會直接愛上。"]
    ],
    quote:"有時候，認識世界是從一餐飯開始。"
  },
  mulan: {
    name:"花木蘭型遊學生",
    type:"勇敢突破型",
    img:"assets/mulan.jpg",
    desc:"你會怕，但你還是會去做。第一次問路、第一次點餐、第一次自己搭車，每次社死都是你的升級任務。",
    countries:[
      ["🇺🇸 美國","最容易逼人成長與開口。"],
      ["🇦🇺 澳洲","有冒險感，但環境相對輕鬆，適合第一次挑戰世界。"]
    ],
    quote:"勇敢不是不怕，是怕了還是出發。"
  }
};

let current = 0;
let scores = {libai:0, dufu:0, sushi:0, mulan:0};

function show(id){
  document.querySelectorAll('.card').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz(){
  current = 0;
  scores = {libai:0, dufu:0, sushi:0, mulan:0};
  show('quiz');
  renderQuestion();
}

function renderQuestion(){
  const item = questions[current];
  document.getElementById('progressText').innerText = `${current+1} / ${questions.length}`;
  document.getElementById('progressBar').style.width = `${((current)/questions.length)*100}%`;
  document.getElementById('questionTitle').innerText = item.q;
  const wrap = document.getElementById('options');
  wrap.innerHTML = '';
  item.opts.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="letter">${String.fromCharCode(65+idx)}</span><span>${opt.text}</span>`;
    btn.onclick = () => choose(opt.type);
    wrap.appendChild(btn);
  });
}

function choose(type){
  scores[type]++;
  current++;
  if(current >= questions.length){
    showResult();
  }else{
    renderQuestion();
  }
}

function showResult(){
  const order = ["libai","dufu","sushi","mulan"];
  let winner = order[0];
  order.forEach(t => {
    if(scores[t] > scores[winner]) winner = t;
  });
  const r = results[winner];
  document.getElementById('resultImage').src = r.img;
  document.getElementById('resultImage').alt = r.name;
  document.getElementById('resultName').innerText = `你是｜${r.name}`;
  document.getElementById('resultType').innerText = r.type;
  document.getElementById('resultDesc').innerText = r.desc;
  document.getElementById('quote').innerText = `「${r.quote}」`;
  document.getElementById('countries').innerHTML = r.countries.map(c => 
    `<div class="country"><b>${c[0]}</b><p>${c[1]}</p></div>`
  ).join('');
  show('result');
}

function restart(){
  show('start');
}

function copyResult(){
  const text = `${document.getElementById('resultName').innerText}\n${document.getElementById('resultType').innerText}\n${document.getElementById('quote').innerText}\n\n我剛測出我的遊學人格！`;
  navigator.clipboard?.writeText(text);
  alert('已複製結果！');
}
</script>
</body>
</html>
